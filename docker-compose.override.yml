services:
  db:
    ports:
      - "5432:5432"
  backend:
    volumes:
      - ./backend:/app
    command: bash -c "alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
  frontend:
    build:
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
  proxy:
    ports:
      - "80:80"
